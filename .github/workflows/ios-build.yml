name: iOS Build

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode versions
        run: |
          ls /Applications | grep Xcode || true
          xcodebuild -version

      - name: Resolve Swift packages
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project GOA_UNIVERSE.xcodeproj \
            -scheme GOA_UNIVERSE

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project GOA_UNIVERSE.xcodeproj \
            -scheme GOA_UNIVERSE \
            -configuration Release \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            build
